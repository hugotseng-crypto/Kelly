<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Kelly Quant - 動態控倉導航儀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-yellow-500">Kelly Quant 導航儀 v1.0</h1>
            <p class="text-gray-400">專為理性投資者設計的動態倉位管理工具</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- 輸入面板 -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h2 class="text-xl mb-4 font-semibold text-blue-400">策略參數設置</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm">勝率 (p): <span id="val-p">50</span>%</label>
                        <input type="range" id="p" min="1" max="99" value="50" class="w-full">
                    </div>
                    <div>
                        <label class="block text-sm">賠率 (b): <span id="val-b">2.0</span></label>
                        <input type="range" id="b" min="0.1" max="10" step="0.1" value="2" class="w-full">
                    </div>
                    <div>
                        <label class="block text-sm">凱利係數 (Fractional): <span id="val-f">0.5</span></label>
                        <input type="range" id="fraction" min="0.1" max="1" step="0.1" value="0.5" class="w-full">
                    </div>
                </div>
                <div class="mt-8 p-4 bg-blue-900/30 rounded-lg">
                    <p class="text-sm">建議投入倉位：</p>
                    <p id="suggested-bet" class="text-4xl font-bold text-green-400">--%</p>
                </div>
            </div>

            <!-- 圖表區 -->
            <div class="md:col-span-2 bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h2 class="text-xl mb-4 font-semibold text-purple-400">預期增長曲線 (Kelly Hill)</h2>
                <canvas id="kellyChart" height="150"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('kellyChart').getContext('2d');
        let chart;

        function calculateKelly(p, b) {
            const q = 1 - p;
            return (b * p - q) / b;
        }

        function update() {
            const p = document.getElementById('p').value / 100;
            const b = parseFloat(document.getElementById('b').value);
            const frac = parseFloat(document.getElementById('fraction').value);
            
            document.getElementById('val-p').innerText = (p * 100).toFixed(0);
            document.getElementById('val-b').innerText = b.toFixed(1);
            document.getElementById('val-f').innerText = frac.toFixed(1);

            const fStar = calculateKelly(p, b);
            const suggested = Math.max(0, fStar * frac);
            document.getElementById('suggested-bet').innerText = (suggested * 100).toFixed(1) + "%";

            // 生成圖表數據
            const labels = [];
            const data = [];
            for (let x = 0; x <= 1; x += 0.05) {
                labels.push((x * 100).toFixed(0) + "%");
                // 簡化的長期增長率公式: g = p*ln(1+f*b) + q*ln(1-f)
                const growth = p * Math.log(1 + x * b) + (1 - p) * Math.log(1 - x);
                data.push(isNaN(growth) || growth < -2 ? -2 : growth);
            }

            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '長期預期增長率',
                        data: data,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    scales: {
                        y: { display: false },
                        x: { grid: { color: '#374151' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        document.querySelectorAll('input').forEach(input => input.oninput = update);
        update();
    </script>
</body>
</html>
